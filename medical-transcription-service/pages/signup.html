<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Create your MedTranscribe account to start getting accurate medical transcriptions.">
    <title>Sign Up — MedTranscribe Medical Transcription</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/fav.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="auth-page">
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header role="banner">
        <nav class="navbar" aria-label="Main navigation">
            <div class="container navbar-inner">
                <a href="../index.html" class="navbar-brand">
                    <img src="../assets/logo.png" alt="MedTranscribe Logo" class="navbar-logo-img">
                </a>
                <div class="navbar-actions">
                    <button class="btn btn-ghost btn-sm" data-rtl-toggle aria-label="Toggle RTL">RTL</button>
                    <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode"><span
                            data-theme-icon>🌙</span></button>
                    <a href="login.html" class="btn btn-secondary btn-sm hide-mobile">Login</a>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-content" style="padding: 120px 0 80px">
        <div class="container" style="max-width: 500px">
            <div class="card">
                <div class="text-center mb-8">
                    <h1 style="font-size: 2rem; margin-bottom: 8px">Create Account</h1>
                    <p class="text-muted">Join 500+ healthcare providers using MedTranscribe</p>
                </div>

                <form data-validate-form onsubmit="window.location.href='dashboard.html'; return false;">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label" for="first-name">First Name</label>
                            <input class="form-input" id="first-name" type="text" placeholder="Sarah" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="last-name">Last Name</label>
                            <input class="form-input" id="last-name" type="text" placeholder="Johnson" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Work Email</label>
                        <input class="form-input" id="email" type="email" placeholder="sarah.j@hospital.org" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="organization">Organization / Practice</label>
                        <input class="form-input" id="organization" type="text" placeholder="St. Mary's Medical Center"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Create Password</label>
                        <input class="form-input" id="password" type="password" placeholder="••••••••" required>
                        <p class="text-[10px] text-muted mt-1">Minimum 8 characters, include a number and symbol.</p>
                    </div>

                    <div class="form-group" style="display:flex; align-items:flex-start; gap:10px">
                        <input type="checkbox" id="terms" style="width:18px; height:18px; margin-top:2px" required>
                        <label for="terms" class="text-xs text-secondary leading-normal">
                            I agree to the <a href="#" class="text-primary-color">Terms of Service</a> and <a href="#"
                                class="text-primary-color">Privacy Policy</a>, including the Business Associate
                            Agreement (BAA).
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary w-full"
                        style="justify-content:center; font-size:1rem">Create Your Account</button>

                    <p class="text-center text-sm mt-6 text-secondary">
                        Already have an account? <a href="login.html" class="text-primary-color font-semibold">Login
                            here</a>
                    </p>
                </form>

                <div class="social-auth">
                    <div class="social-auth-divider">Or sign up with</div>
                    <div class="social-btns">
                        <button class="social-btn google" aria-label="Sign up with Google">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853" />
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05" />
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335" />
                            </svg>
                        </button>
                        <button class="social-btn github" aria-label="Sign up with GitHub">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                            </svg>
                        </button>
                        <button class="social-btn twitter" aria-label="Sign up with Twitter">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.84 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/main.js"></script>
</body>

</html>
