<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your MedTranscribe account to manage your medical transcription jobs.">
    <title>Login — MedTranscribe Medical Transcription</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="auth-page">
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header role="banner">
        <nav class="navbar" aria-label="Main navigation">
            <div class="container navbar-inner">
                <a href="index.html" class="navbar-brand">
                    <div class="navbar-logo">MT</div>
                    <div class="navbar-title">MedTranscribe<span>Medical Transcription</span></div>
                </a>
                <div class="navbar-actions">
                    <button class="btn btn-ghost btn-sm" data-rtl-toggle aria-label="Toggle RTL">RTL</button>
                    <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode"><span
                            data-theme-icon>🌙</span></button>
                    <a href="signup.html" class="btn btn-secondary btn-sm">Sign Up</a>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-content" style="padding: 120px 0 80px">
        <div class="container" style="max-width: 440px">
            <div class="card">
                <div class="text-center mb-8">
                    <h1 style="font-size: 2rem; margin-bottom: 8px">Welcome Back</h1>
                    <p class="text-muted">Enter your credentials to access your portal</p>
                </div>

                <form data-validate-form onsubmit="window.location.href='dashboard.html'; return false;">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input class="form-input" id="email" type="email" placeholder="dr.smith@hospital.com" required>
                    </div>
                    <div class="form-group">
                        <div class="flex justify-between items-center mb-2">
                            <label class="form-label" for="password" style="margin-bottom:0">Password</label>
                            <a href="#" class="text-xs text-primary-color font-semibold">Forgot Password?</a>
                        </div>
                        <input class="form-input" id="password" type="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-group" style="display:flex; align-items:center; gap:8px">
                        <input type="checkbox" id="remember" style="width:16px; height:16px">
                        <label for="remember" class="text-sm text-secondary">Remember me for 30 days</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-full"
                        style="justify-content:center; font-size:1rem">Login to Dashboard</button>

                    <p class="text-center text-sm mt-6 text-secondary">
                        Don't have an account? <a href="signup.html" class="text-primary-color font-semibold">Create
                            account</a>
                    </p>
                </form>
            </div>

            <div class="text-center mt-8">
                <p class="text-xs text-muted">
                    Secure, HIPAA-compliant authentication. By logging in, you agree to our <a href="#">Terms</a> and <a
                        href="#">Privacy Policy</a>.
                </p>
            </div>
        </div>
    </main>

    <script src="../assets/js/main.js"></script>
</body>

</html>
